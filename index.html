<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feet Up Craft Co</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #0f766e;
      --primary-dark: #0b5c56;
      --border: #e5e7eb;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      --radius: 22px;
    }

    body {
      font-family: "Poppins", sans-serif;
      background: linear-gradient(180deg, #eef4f7 0%, #f9fbfc 100%);
      color: var(--text);
      line-height: 1.5;
    }

    .hero {
      position: relative;
      min-height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: white;
      text-align: center;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(10, 25, 35, 0.45), rgba(10, 25, 35, 0.65)),
        url("guitar.jpg") center/cover no-repeat;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 900px;
    }

    .hero h1 {
      font-size: clamp(2.2rem, 5vw, 4rem);
      font-weight: 800;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 1.05rem;
      opacity: 0.95;
    }

    .wrapper {
      max-width: 1200px;
      margin: -50px auto 60px;
      padding: 0 20px;
      position: relative;
      z-index: 2;
    }

    .top-bar {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 18px 20px;
      margin-bottom: 28px;
    }

    .top-bar-inner {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }

    .top-bar h2 {
      font-size: 1.35rem;
      font-weight: 700;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      border-radius: 14px;
      padding: 14px 20px;
      font-weight: 700;
      transition: 0.2s ease;
      min-height: 50px;
    }

    .btn-shop {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 10px 24px rgba(15, 118, 110, 0.24);
    }

    .btn-shop:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
    }

    .instructions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 280px));
      gap: 22px;
      justify-content: start;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: 0.25s ease;
    }

    .card:hover {
      transform: translateY(-6px);
    }

    .card-image {
      height: 220px;
      overflow: hidden;
      background: #e5e7eb;
    }

    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-body {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex: 1;
    }

    .card h3 {
      font-size: 1.12rem;
      line-height: 1.3;
      font-weight: 700;
    }

    .card p {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .meta {
      display: grid;
      gap: 8px;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f8fafc;
      border: 1px solid #edf2f7;
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 0.95rem;
      font-weight: 600;
    }

    .meta-item i {
      width: 18px;
      text-align: center;
      color: var(--primary);
      flex-shrink: 0;
    }

    .meta-item span {
      margin-left: auto;
      color: var(--muted);
      font-weight: 500;
    }

    .card-actions {
      margin-top: auto;
    }

    .btn-card {
      width: 100%;
      background: var(--primary);
      color: white;
      box-shadow: 0 10px 24px rgba(15, 118, 110, 0.18);
    }

    .btn-card:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
    }

    footer {
      text-align: center;
      color: var(--muted);
      padding: 10px 20px 30px;
      font-size: 0.95rem;
    }

    @media (max-width: 640px) {
      .hero {
        min-height: 260px;
        padding: 40px 20px;
      }

      .wrapper {
        margin-top: -35px;
      }

      .top-bar-inner {
        flex-direction: column;
        align-items: stretch;
      }

      .btn-shop {
        width: 100%;
      }

      .instructions-grid {
        grid-template-columns: 1fr;
        justify-content: stretch;
      }

      .card-image {
        height: 240px;
      }
    }
  </style>
</head>
<body>
  <header class="hero">
    <div class="hero-content">
      <h1>Feet Up Craft Co</h1>
      <p>Instructions for your purchase!</p>
    </div>
  </header>

  <main class="wrapper">
    <section class="top-bar">
      <div class="top-bar-inner">
        <div>
          <h2>Instruction Guides</h2>
        </div>

        <a href="https://feetupcraftco.bigcartel.com/" class="btn btn-shop">
          <i class="fa-solid fa-shop"></i>
          Goto Shop
        </a>
      </div>
    </section>

    <section class="instructions-grid">
      <article class="card">
        <div class="card-image">
          <a href="guitar.html"><img src="guitar.jpg" alt="Laser Cut Guitar" loading="lazy"></a>
        </div>

        <div class="card-body">
          <h3>Guitar</h3>
          <p>A clean and easy guitar to display.</p>

          <div class="meta">
            <div class="meta-item">
              <i class="fa-solid fa-screwdriver-wrench"></i>
              <span>Beginner-friendly</span>
            </div>

            <div class="meta-item">
              <i class="fa-regular fa-clock"></i>
              <span>10 mins</span>
            </div>

            <div class="meta-item">
              <i class="fa-solid fa-list-check"></i>
              <span>6 steps</span>
            </div>
          </div>

          <div class="card-actions">
            <a href="guitar.html" class="btn btn-card">
              <i class="fa-solid fa-book-open"></i>
              View Product
            </a>
          </div>
        </div>
      </article>
    </section>
  </main>

  <footer>
    © 2026 Feet Up Craft Co.
  </footer>
</body>
</html>
